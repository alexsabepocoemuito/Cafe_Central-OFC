<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contato - Café Central</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/contato.css">
    </head>
    <body>
        <header class="topo">
            <div class="logo">
                <a href="../index.html">
                    <img src="../img/cafe_central_logo_classic.png" width="120" height="120" style="display: block; margin: 0 auto" alt="Logo Café Central">
                </a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="cardapio.html">Cardápio</a>
                <a href="contato.html" class="ativo">Contato</a>
                <a href="login.html">Login</a>
            </nav>
        </header>

        <main class="contato">
            <div class="form-container">
                <h1>Fale Conosco</h1>
                <form id="formContato">
                    <div class="campo">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu Nome">
                    </div>
                    <div class="campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required placeholder="Digite seu Email">
                    </div>
                    <div class="campo">
                        <label for="mensagem">Mensagem:</label>
                        <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Digite sua Mensagem"></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                </form>
            </div>
        </main>

        <footer class="rodape">
            <p>&reg; 2026 Café Central. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

        <script src="../js/contato.js"></script>
    </body>
</html>
