<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro - Café Central</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/auth.css">
    </head>
    <body>
        <header class="topo">
            <div class="logo">
                <a href="../index.html">
                    <img src="../img/cafe_central_logo_classic.png" width="120" height="120" style="display: block; margin: 0 auto" alt="Logo Café Central">
                </a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="cardapio.html">Cardápio</a>
                <a href="contato.html">Contato</a>
                <a href="login.html">Login</a>
            </nav>
        </header>

        <main class="auth-container">
            <div class="auth-box">
                <h1>Cadastro</h1>
                <form id="formCadastro">
                    <div class="campo">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" required placeholder="Digite seu nome">
                    </div>
                    <div class="campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" required placeholder="Digite seu e-mail">
                    </div>
                    <div class="campo">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" required placeholder="Digite sua senha">
                    </div>
                    <div class="campo">
                        <label for="confirmaSenha">Confirmar Senha:</label>
                        <input type="password" id="confirmaSenha" required placeholder="Confirme sua senha">
                    </div>
                    <button type="submit" class="btn-auth">Cadastrar</button>
                </form>
                <p id="mensagemCadastro">
                    
                </p>
                <p>Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
            </div>
        </main>

        <footer class="rodape">
            <p>® 2026 Café Central. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

        <script src="../js/auth.js"></script>
    </body>
</html>
</html>
