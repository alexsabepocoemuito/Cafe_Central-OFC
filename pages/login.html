<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Café Central</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/auth.css">
    </head>
    <body>
        <header class="topo">
            <div class="logo">
                <a href="../index.html">
                    <img src="../img/cafe_central_logo_classic.png" width="120" height="120" style="display: block; margin: 0 auto" alt="Logo Café Central">
                </a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="cardapio.html">Cardápio</a>
                <a href="contato.html">Contato</a>
                <a href="login.html" class="ativo">Login</a>
            </nav>
        </header>

        <main class="auth-container">
            <div class="auth-box">
                <h1>Login</h1>
                <form id="formLogin">
                    <div class="campo">
                        <label for="emailLogin">E-mail:</label>
                        <input type="email" id="emailLogin" required placeholder="Digite seu e-mail">
                    </div>
                    <div class="campo">
                        <label for="senhaLogin">Senha:</label>
                        <input type="password" id="senhaLogin" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn-auth">Entrar</button>
                </form>
                <p id="mensagemLogin"></p>
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
            </div>
        </main>

        <footer class="rodape">
            <p>&reg; 2026 Café Central. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>

        <script src="../js/auth.js"></script>
    </body>
</html>
